{% extends "layout/base.html" %}

{% block content %}

<h2>Daily Attendance</h2>

<div class="card">

<form method="post">
{% csrf_token %}

<table class="table">

<tr>
<th>Student</th>
<th>Status</th>
</tr>

{% for student in students %}

<tr>

<td>{{ student.name }}</td>

<td>
<label>
<input type="radio" name="{{ student.id }}" value="present">
Present
</label>

<label>
<input type="radio" name="{{ student.id }}" value="absent">
Absent
</label>
</td>

</tr>

{% endfor %}

</table>

<br>

<button type="submit" class="btn primary">
Save Attendance
</button>

</form>

</div>

{% endblock %}
