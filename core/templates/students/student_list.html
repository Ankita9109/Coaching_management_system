{% extends "layout/base.html" %}

{% block content %}

<h2>Students</h2>

<div class="card">

<form method="get">
<input name="q" placeholder="Search student">
<button class="btn">Search</button>
</form>

<br>

<table>

<tr>
<th>Name</th>
<th>Phone</th>
<th>Course</th>
<th>Actions</th>
</tr>

{% for s in students %}
<tr>

<td>{{ s.name }}</td>
<td>{{ s.phone }}</td>
<td>{{ s.course.name }}</td>

<td>

<select onchange="handleAction(this.value, '{{ s.id }}')">
    <option value="">Actions</option>
    <option value="edit">Edit</option>
    <option value="delete">Remove</option>
    <option value="fees">Fees</option>
    <option value="attendance">Attendance</option>
    <option value="profile">Profile</option>
</select>

</td>

</tr>
{% endfor %}

</table>

</div>

<!-- ✅ JS yahi andar hona chahiye -->
<script>
function handleAction(action, id) {
    if (action === "edit") {
        window.location.href = "/edit-student/" + id;
    }
    else if (action === "delete") {
        window.location.href = "/delete-student/" + id;
    }
    else if (action === "fees") {
        window.location.href = "/fees/" + id;
    }
    else if (action === "attendance") {
        window.location.href = "/attendance/" + id;
    }
    else if (action === "profile") {
        window.location.href = "/profile/" + id;
    }
}
</script>

{% endblock %}
