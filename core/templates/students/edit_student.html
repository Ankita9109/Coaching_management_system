{% extends "layout/base.html" %}

{% block content %}

<div class="card form-card">

<h2>Edit Student</h2>

<form method="post">
{% csrf_token %}

<label>Name</label>
<input type="text" name="name" value="{{ student.name }}" required>

<label>Phone</label>
<input type="text" name="phone" value="{{ student.phone }}" required>

<label>Course</label>
<select name="course">

{% for c in courses %}
<option value="{{ c.id }}" {% if student.course.id == c.id %}selected{% endif %}>
{{ c.name }}
</option>
{% endfor %}

</select>

<br><br>

<button type="submit" class="btn primary">Update Student</button>

</form>

</div>

{% endblock %}
